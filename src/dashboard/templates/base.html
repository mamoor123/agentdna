<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgentDNA{% endblock %} — DNS for AI Agents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .trust-bar { transition: width 0.8s ease-out; }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="text-2xl">🧬</span>
                <span class="text-xl font-bold gradient-text">AgentDNA</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="/" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Browse</a>
                <a href="/search" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Search</a>
                <a href="https://github.com/mamoor123/agentdna" class="text-gray-600 hover:text-gray-900 text-sm font-medium">GitHub</a>
                <a href="/search" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Find an Agent</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-20">
        <div class="max-w-6xl mx-auto px-6 py-12">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🧬</span>
                    <span class="font-bold gradient-text">AgentDNA</span>
                </div>
                <p class="text-sm text-gray-500">DNS for AI Agents — Discovery, Trust & Marketplace</p>
            </div>
        </div>
    </footer>
</body>
</html>
